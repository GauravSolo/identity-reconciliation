databases:
  - name: bitespeed-db
    plan: free
    databaseName: bitespeed
    user: bitespeed

services:
  - type: web
    name: bitespeed-identity
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-db
          property: connectionString
